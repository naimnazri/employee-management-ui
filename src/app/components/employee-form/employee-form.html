<div class="card mt-3">
  <div class="card-header">
    @if(employee.employeeId === 0) {
      Add New Employee
      }
    @else{
      Edit Employee
      }
  </div>

  <div class="card-body">

    <div class="mb-3">
      <label class="form-label">First Name</label>
      <input title="first-name" name="firstname" class="form-control" [(ngModel)]="employee.firstName">
    </div>

    <div class="mb-3">
      <label class="form-label">Last Name</label>
      <input title="last-name" name="lastname" class="form-control" [(ngModel)]="employee.lastName">
    </div>

    <div class="mb-3">
      <label class="form-label">Email</label>
      <input title="email" name="email" class="form-control" [(ngModel)]="employee.email">
    </div>

    <div class="mb-3">
      <label class="form-label">Department</label>
      <input title="department" name="department" class="form-control" [(ngModel)]="employee.department">
    </div>

    <div class="mb-3">
      <label class="form-label">Position</label>
      <input title="position" name="position" class="form-control" [(ngModel)]="employee.position">
    </div>

    <button class="btn btn-success" (click)="save()"
      [disabled]="!employee.firstName || !employee.lastName || !employee.email">
      Save
    </button>

    <button class="btn btn-secondary ms-2" (click)="cancel()">
      Cancel
    </button>

  </div>
</div>
